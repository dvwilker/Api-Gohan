services:
  - type: web
    name: api-gohan
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: NODE_ENV
        value: production
    buildpacks:
      - https://github.com/heroku/heroku-buildpack-nodejs.git