<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CACAROTO API</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            padding: 30px;
            text-align: center;
        }

        .login-header h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .login-header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 8px;
        }

        .login-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .form-control.is-invalid {
            border-color: #dc3545;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>CACAROTO API</h2>
                <p>Iniciar sesión</p>
            </div>
            <div class="login-body">
                <div class="error-message" id="errorMessage"></div>
                
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" class="form-control" id="email" placeholder="tucorreo@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••">
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="rememberCheckbox">
                    <label for="rememberCheckbox">Recordarme</label>
                </div>
                
                <button class="btn-login" id="loginBtn">Iniciar sesión</button>
                
                <div class="switch-link">
                    ¿No tienes una cuenta? <a href="register.html">Crear cuenta</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user was previously logged in
        const savedSession = localStorage.getItem('cacaroto_session');
        if (savedSession) {
            const session = JSON.parse(savedSession);
            if (session.email && session.remember) {
                window.location.href = 'index.html';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', loginUser);
        
        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });

        function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberCheckbox').checked;
            
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                showError('Por favor ingresa tu correo y contraseña');
                return;
            }
            
            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('cacaroto_users') || '[]');
            
            // Find user
            const user = users.find(u => u.email === email && u.password === password);
            
            if (!user) {
                showError('Correo o contraseña incorrectos');
                return;
            }
            
            // Save session
            const session = {
                userId: user.id,
                email: user.email,
                fullName: user.fullName,
                remember: rememberMe,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('cacaroto_session', JSON.stringify(session));
            localStorage.setItem('cacaroto_current_user', JSON.stringify(user));
            
            // Redirect to index.html
            window.location.href = 'index.html';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
