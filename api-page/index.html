<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CACAROTO API</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #2c2c2c;
            background: #ffffff;
            overflow-x: hidden;
        }

        /* Login/Register Styles */
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            padding: 30px;
            text-align: center;
        }

        .auth-header h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .auth-header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 8px;
        }

        .auth-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .switch-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }
        .strength-weak { color: #dc3545; }
        .strength-medium { color: #ffc107; }
        .strength-strong { color: #28a745; }

        /* API Dashboard Styles (cuando está logueado) */
        .dashboard-container {
            display: none;
        }

        .dashboard-container.active {
            display: block;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: #2c2c2c;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        .api-name {
            font-size: 18px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f5f5f5;
            padding: 6px 15px;
            border-radius: 30px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #dc3545;
            font-size: 12px;
            cursor: pointer;
        }

        .sidebar {
            position: fixed;
            top: 60px;
            left: -280px;
            width: 280px;
            height: calc(100vh - 60px);
            background: #ffffff;
            border-right: 1px solid #e5e5e5;
            transition: left 0.3s ease;
            z-index: 999;
            overflow-y: auto;
        }

        .sidebar.active { left: 0; }

        .sidebar-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 60px);
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .sidebar-item:hover { background: #f5f5f5; }
        .sidebar-item.active {
            background: #f5f5f5;
            border-left-color: #2c2c2c;
        }

        .sidebar-category {
            padding: 20px 20px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
        }

        .main-content {
            margin-top: 60px;
            padding: 40px 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .status-card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 20px;
        }

        .status-card-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
        }

        .status-card-value {
            font-size: 24px;
            font-weight: 600;
        }

        .uptime-value {
            font-family: monospace;
            font-size: 28px;
            font-weight: 700;
            color: #28a745;
        }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .endpoint-card {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .endpoint-btn {
            background: #2c2c2c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2c2c2c;
        }

        .response-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #e5e5e5;
        }

        @media (max-width: 768px) {
            .main-content { padding: 20px 15px; }
            .endpoints-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Login/Registro -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>CACAROTO API</h2>
                <p id="authSubtitle">Iniciar sesión</p>
            </div>
            <div class="auth-body">
                <div id="authError" class="error-message"></div>
                <div id="authSuccess" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="tucorreo@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="••••••••">
                    </div>
                    <button class="btn-auth" id="doLoginBtn">Iniciar sesión</button>
                    <div class="switch-link">
                        ¿No tienes cuenta? <a id="showRegisterLink">Crear cuenta</a>
                    </div>
                </div>

                <div id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" class="form-control" id="regFullName" placeholder="Tu nombre completo">
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="tucorreo@ejemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="••••••••">
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar contraseña</label>
                        <input type="password" class="form-control" id="regConfirmPassword" placeholder="••••••••">
                    </div>
                    <button class="btn-auth" id="doRegisterBtn">Crear cuenta</button>
                    <div class="switch-link">
                        ¿Ya tienes cuenta? <a id="showLoginLink">Iniciar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard de la API (oculto hasta login) -->
    <div id="dashboardContainer" class="dashboard-container">
        <div class="top-bar">
            <div class="top-bar-left" style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-toggle" id="menuToggle">
                    <span></span><span></span><span></span>
                </button>
                <div class="api-name">CACAROTO API</div>
            </div>
            <div class="top-bar-right">
                <div class="user-info">
                    <span id="userNameDisplay"></span>
                    <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
                </div>
            </div>
        </div>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar" id="sidebar">
            <div class="sidebar-nav">
                <div class="sidebar-item active" data-page="home">Home</div>
                <div class="sidebar-item" data-page="status">Status</div>
                <div class="sidebar-category">Categories</div>
                <div id="categoriesNav"></div>
                <div class="sidebar-item" data-page="all">All Endpoints</div>
            </div>
        </div>

        <div class="main-content" id="mainContent"></div>
        <div class="footer">
            <p>Created by CACAROTO Team</p>
        </div>
    </div>

    <!-- Modal para endpoints -->
    <div class="modal fade" id="apiModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div>
                        <h5 class="modal-title" id="modalTitle"></h5>
                        <p class="modal-desc" id="modalDesc"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="endpointBox" style="background:#f8f9fa; padding:12px; border-radius:6px; font-family:monospace; display:none;"></div>
                    <div id="paramsContainer"></div>
                    <div id="loadingContainer" style="display:none; text-align:center; padding:40px;">
                        <div class="spinner-border"></div>
                    </div>
                    <div id="responseContainer"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-dark" id="submitBtn" style="display:none;">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============ SISTEMA DE AUTENTICACIÓN ============
        let currentUser = null;

        // Verificar si hay sesión guardada
        function checkSession() {
            const savedUser = localStorage.getItem('cacaroto_current_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboardContainer').classList.add('active');
            document.getElementById('userNameDisplay').textContent = currentUser.fullName;
            loadDashboardSettings();
        }

        function showAuth() {
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('cacaroto_current_user');
            currentUser = null;
            showAuth();
            // Limpiar formularios
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Registrar usuario
        function registerUser() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            const errorDiv = document.getElementById('authError');
            const successDiv = document.getElementById('authSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!fullName || !email || !password) {
                errorDiv.textContent = 'Por favor completa todos los campos';
                errorDiv.style.display = 'block';
                return;
            }
            
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Correo electrónico inválido';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('cacaroto_users') || '[]');
            if (users.some(u => u.email === email)) {
                errorDiv.textContent = 'Este correo ya está registrado';
                errorDiv.style.display = 'block';
                return;
            }
            
            const newUser = {
                id: Date.now(),
                fullName: fullName,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('cacaroto_users', JSON.stringify(users));
            
            successDiv.textContent = '¡Cuenta creada! Ahora inicia sesión';
            successDiv.style.display = 'block';
            
            // Limpiar y cambiar a login
            setTimeout(() => {
                document.getElementById('regFullName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                showLoginForm();
                successDiv.style.display = 'none';
            }, 2000);
        }
        
        function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Ingresa tu correo y contraseña';
                errorDiv.style.display = 'block';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('cacaroto_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (!user) {
                errorDiv.textContent = 'Correo o contraseña incorrectos';
                errorDiv.style.display = 'block';
                return;
            }
            
            currentUser = user;
            localStorage.setItem('cacaroto_current_user', JSON.stringify(user));
            showDashboard();
        }
        
        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('authSubtitle').textContent = 'Crear cuenta';
        }
        
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('authSubtitle').textContent = 'Iniciar sesión';
        }
        
        // Verificar fuerza de contraseña
        document.getElementById('regPassword')?.addEventListener('input', function() {
            const password = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                return;
            }
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            let text = '', classname = '';
            if (strength <= 2) { text = 'Débil'; classname = 'strength-weak'; }
            else if (strength <= 4) { text = 'Media'; classname = 'strength-medium'; }
            else { text = 'Fuerte'; classname = 'strength-strong'; }
            strengthDiv.innerHTML = `Fortaleza: <span class="${classname}">${text}</span>`;
        });
        
        // ============ API DASHBOARD ============
        let settings = {};
        let uptimeSeconds = 0;
        let uptimeInterval = null;
        
        async function loadDashboardSettings() {
            try {
                const response = await fetch('/src/settings.json');
                settings = await response.json();
            } catch (error) {
                console.log('Usando configuración por defecto');
                settings = {
                    name: 'CACAROTO API',
                    version: 'v1.0',
                    description: 'API Documentation',
                    categories: [
                        { name: 'Ejemplo', items: [
                            { name: 'Test Endpoint', desc: 'Endpoint de prueba', path: '/api/test' }
                        ] }
                    ]
                };
            }
            
            // Cargar categorías en sidebar
            const categoriesNav = document.getElementById('categoriesNav');
            if (settings.categories) {
                settings.categories.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item';
                    item.dataset.page = 'category';
                    item.dataset.category = cat.name;
                    item.textContent = cat.name;
                    categoriesNav.appendChild(item);
                });
            }
            
            initializeDashboardUI();
            renderPage('home');
        }
        
        function initializeDashboardUI() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
            
            overlay.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
            
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    const category = item.dataset.category;
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    renderPage(page, category);
                    menuToggle.classList.remove('active');
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                });
            });
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }
        
        function renderPage(page, category = null) {
            if (page !== 'status' && uptimeInterval) {
                clearInterval(uptimeInterval);
                uptimeInterval = null;
            }
            
            const content = document.getElementById('mainContent');
            if (page === 'home') renderHome(content);
            else if (page === 'status') renderStatus(content);
            else if (page === 'category') renderCategory(content, category);
            else if (page === 'all') renderAllEndpoints(content);
        }
        
        function renderHome(container) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px 20px;">
                    <h1 style="font-size:42px; font-weight:600;">${settings.name || 'CACAROTO API'}</h1>
                    <div style="display:inline-block; background:#2c2c2c; color:white; padding:6px 16px; border-radius:20px; margin:20px 0;">${settings.version || 'v1.0'}</div>
                    <p style="font-size:18px; color:#666;">${settings.description || 'API Documentation'}</p>
                    <div style="background:linear-gradient(135deg, #667eea, #764ba2); padding:30px; border-radius:15px; color:white; margin-top:30px;">
                        <h3>👋 Bienvenido, ${currentUser.fullName}!</h3>
                        <p>Has iniciado sesión correctamente en CACAROTO API</p>
                    </div>
                </div>
            `;
        }
        
        async function renderStatus(container) {
            container.innerHTML = `
                <h2 style="font-size:28px; margin-bottom:30px;">API Status <span style="background:#28a745; color:white; padding:5px 12px; border-radius:30px; font-size:13px; margin-left:15px;">🔴 LIVE</span></h2>
                <div class="status-grid" id="statusGrid"></div>
            `;
            
            try {
                const response = await fetch('/status');
                const data = await response.json();
                uptimeSeconds = data.uptime_seconds || 0;
                
                const grid = document.getElementById('statusGrid');
                grid.innerHTML = `
                    <div class="status-card"><div class="status-card-title">Status</div><div class="status-card-value" style="color:#28a745;">Online</div></div>
                    <div class="status-card"><div class="status-card-title">Version</div><div class="status-card-value">${settings.version || 'N/A'}</div></div>
                    <div class="status-card"><div class="status-card-title">UPTIME</div><div class="status-card-value uptime-value" id="uptimeDisplay">0s</div><div id="uptimeSeconds" style="font-size:12px; color:#666;">0 segundos</div></div>
                    <div class="status-card"><div class="status-card-title">Total Requests</div><div class="status-card-value">${data.total_requests || 0}</div></div>
                    <div class="status-card"><div class="status-card-title">Active Users</div><div class="status-card-value">${data.active_users || 0}</div></div>
                    <div class="status-card"><div class="status-card-title">Daily Limit</div><div class="status-card-value">${data.daily_limit || 'N/A'}</div></div>
                    <div class="status-card"><div class="status-card-title">Routes Loaded</div><div class="status-card-value">${data.routes_loaded || 0}</div></div>
                    <div class="status-card"><div class="status-card-title">API Latency</div><div class="status-card-value">${data.api_latency_ms || 0}ms</div></div>
                    <div class="status-card"><div class="status-card-title">CPU Cores</div><div class="status-card-value">${data.system?.cores || 'N/A'}</div><div style="font-size:12px;">${data.system?.cpu_model || ''}</div></div>
                    <div class="status-card"><div class="status-card-title">CPU Load</div><div class="status-card-value">${data.system?.cpu_load_percent || 0}%</div></div>
                    <div class="status-card"><div class="status-card-title">RAM Usage</div><div class="status-card-value">${data.system?.ram_used_gb || 0} GB</div><div style="font-size:12px;">of ${data.system?.ram_total_gb || 0} GB</div></div>
                    <div class="status-card"><div class="status-card-title">Disk Usage</div><div class="status-card-value">${data.system?.disk_used_gb || 0} GB</div><div style="font-size:12px;">of ${data.system?.disk_total_gb || 0} GB</div></div>
                `;
            } catch(e) {
                document.getElementById('statusGrid').innerHTML = '<p>Error cargando status</p>';
                if (!uptimeSeconds) uptimeSeconds = Math.floor(Date.now() / 1000) - (sessionStorage.getItem('api_start') || Date.now()/1000);
            }
            
            updateUptimeDisplay();
            uptimeInterval = setInterval(() => { uptimeSeconds++; updateUptimeDisplay(); }, 1000);
        }
        
        function updateUptimeDisplay() {
            const days = Math.floor(uptimeSeconds / 86400);
            const hours = Math.floor((uptimeSeconds % 86400) / 3600);
            const minutes = Math.floor((uptimeSeconds % 3600) / 60);
            const secs = uptimeSeconds % 60;
            let display = '';
            if (days > 0) display = `${days}d ${hours}h ${minutes}m ${secs}s`;
            else if (hours > 0) display = `${hours}h ${minutes}m ${secs}s`;
            else if (minutes > 0) display = `${minutes}m ${secs}s`;
            else display = `${secs}s`;
            
            const el = document.getElementById('uptimeDisplay');
            const secEl = document.getElementById('uptimeSeconds');
            if (el) el.textContent = display;
            if (secEl) secEl.textContent = `${uptimeSeconds.toLocaleString()} segundos`;
        }
        
        function renderCategory(container, categoryName) {
            const category = settings.categories?.find(c => c.name === categoryName);
            if (!category) return;
            container.innerHTML = `
                <input type="text" class="search-input" placeholder="Buscar endpoints..." id="searchInput">
                <div class="category-section">
                    <h2 class="category-title">${category.name}</h2>
                    <div class="endpoints-grid" id="endpointsGrid">
                        ${category.items.map(item => `
                            <div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                                <div><strong>${item.name}</strong><br><small style="color:#999;">${item.desc}</small></div>
                                <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}">GET</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            setupSearchAndButtons();
        }
        
        function renderAllEndpoints(container) {
            let html = `<input type="text" class="search-input" placeholder="Buscar endpoints..." id="searchInput">`;
            settings.categories?.forEach(cat => {
                html += `<div class="category-section"><h2 class="category-title">${cat.name}</h2><div class="endpoints-grid">`;
                cat.items.forEach(item => {
                    html += `<div class="endpoint-card" data-name="${item.name.toLowerCase()}">
                        <div><strong>${item.name}</strong><br><small style="color:#999;">${item.desc}</small></div>
                        <button class="endpoint-btn" data-path="${item.path}" data-name="${item.name}" data-desc="${item.desc}">GET</button>
                    </div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
            setupSearchAndButtons();
        }
        
        function setupSearchAndButtons() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.endpoint-card').forEach(card => {
                        const name = card.dataset.name;
                        card.style.display = name.includes(term) ? '' : 'none';
                    });
                });
            }
            document.querySelectorAll('.endpoint-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const modal = new bootstrap.Modal(document.getElementById('apiModal'));
                    document.getElementById('modalTitle').textContent = btn.dataset.name;
                    document.getElementById('modalDesc').textContent = btn.dataset.desc;
                    document.getElementById('paramsContainer').innerHTML = '';
                    document.getElementById('responseContainer').innerHTML = '';
                    document.getElementById('submitBtn').style.display = 'none';
                    document.getElementById('endpointBox').style.display = 'block';
                    document.getElementById('endpointBox').textContent = window.location.origin + btn.dataset.path;
                    makeApiRequest(window.location.origin + btn.dataset.path);
                    modal.show();
                });
            });
        }
        
        async function makeApiRequest(url) {
            const loading = document.getElementById('loadingContainer');
            const responseDiv = document.getElementById('responseContainer');
            loading.style.display = 'block';
            responseDiv.innerHTML = '';
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const contentType = res.headers.get('Content-Type');
                if (contentType?.startsWith('image/')) {
                    const blob = await res.blob();
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    img.style.maxWidth = '100%';
                    img.style.borderRadius = '8px';
                    responseDiv.appendChild(img);
                } else {
                    const data = await res.json();
                    const pre = document.createElement('pre');
                    pre.className = 'response-box';
                    pre.textContent = JSON.stringify(data, null, 2);
                    responseDiv.appendChild(pre);
                }
            } catch(e) {
                responseDiv.innerHTML = `<pre class="response-box" style="color:#dc3545;">Error: ${e.message}</pre>`;
            }
            loading.style.display = 'none';
        }
        
        // Inicializar eventos de autenticación
        document.getElementById('doLoginBtn')?.addEventListener('click', loginUser);
        document.getElementById('doRegisterBtn')?.addEventListener('click', registerUser);
        document.getElementById('showRegisterLink')?.addEventListener('click', showRegisterForm);
        document.getElementById('showLoginLink')?.addEventListener('click', showLoginForm);
        
        // Verificar sesión al cargar
        checkSession();
    </script>
</body>
</html>
